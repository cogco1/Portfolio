<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="560" viewBox="0 0 1160 560" role="img" aria-label="六步原子:observe 观察、menu 菜单、mask 掩码、policy 策略、apply 应用、gate 门;策略席可插拔(确定性/LLM/人),每步上账">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;family=Space+Mono:wght@400;700&amp;family=Noto+Sans+SC:wght@400;500;700&amp;display=swap');
:root{--ink:#1a1a1a;--muted:#737373;--faint:#a6a6a6;--line:#ededed;--line-strong:#dcdcdc;--bg:#ffffff;--ok:#3f7350;--gate:#a3822f;--risk:#a4453a;
--sans:"Inter","Noto Sans SC","PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;
--mono:"Space Mono","SFMono-Regular",Consolas,Menlo,monospace;}
@media (prefers-color-scheme:dark){:root{--ink:#e8e8e8;--muted:#9a9a9a;--faint:#6f6f6f;--line:#242424;--line-strong:#333333;--bg:#141414;--ok:#6fae83;--gate:#c9a558;--risk:#c76b5f;}}
.bg{fill:var(--bg)}
.bx{fill:none;stroke:var(--line-strong);stroke-width:1}
.bx2{fill:none;stroke:var(--ink);stroke-width:1.3}
.t1{font:700 13px var(--sans);fill:var(--ink)}
.t1m{font:700 12px var(--mono);fill:var(--ink)}
.t2{font:11px var(--sans);fill:var(--muted)}
.t2s{font:10px var(--sans);fill:var(--muted)}
.t3{font:9.5px var(--mono);fill:var(--faint);letter-spacing:.08em}
.t4{font:10.5px var(--sans);fill:var(--ink)}
.t5{font:10px var(--mono);fill:var(--muted)}
.gt-m{font:9.5px var(--mono);fill:var(--gate);letter-spacing:.04em}
.gt-l{stroke:var(--gate);stroke-width:1.2;fill:none}
.ln{stroke:var(--ink);stroke-width:1;fill:none}
.lnf{stroke:var(--faint);stroke-width:.8;fill:none}
.dot{fill:var(--faint)}
.ok-l{stroke:var(--ok);stroke-width:1.3;fill:none}
.ok-t{font:10px var(--sans);fill:var(--ok)}
.rk-l{stroke:var(--risk);stroke-width:1.2;fill:none}
.rk-t{font:10.5px var(--sans);fill:var(--risk)}
.rk-s{font:9.5px var(--mono);fill:var(--risk);letter-spacing:.06em}
.ah{fill:var(--ink)}.ahk{fill:var(--ok)}.ahr{fill:var(--risk)}
</style>
<rect class="bg" width="1160" height="560"/>
<defs>
<marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="ah"/></marker>
<marker id="ahk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="ahk"/></marker>
<marker id="ahr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="ahr"/></marker>
</defs>

<text x="40" y="34" class="t3">每个决策 DXX = 六步原子 SIX-STEP ATOM · 观察→菜单→掩码→策略→应用→门</text>
<text x="1120" y="34" text-anchor="end" class="gt-m">判别刀:法可写死 · 选择必过席(铁律15候选)</text>

<!-- 策略步上方注 -->
<text x="633" y="57" text-anchor="middle" class="t2s">只答「合法集里选哪个」· LLM 只提议</text>

<!-- 六步 -->
<rect x="40" y="64" width="130" height="64" class="bx"/>
<text x="105" y="90" class="t1" text-anchor="middle">观察</text>
<text x="105" y="108" class="t3" text-anchor="middle">observe</text>
<rect x="216" y="64" width="130" height="64" class="bx"/>
<text x="281" y="90" class="t1" text-anchor="middle">菜单</text>
<text x="281" y="108" class="t3" text-anchor="middle">menu</text>
<rect x="392" y="64" width="130" height="64" class="bx"/>
<text x="457" y="90" class="t1" text-anchor="middle">掩码</text>
<text x="457" y="108" class="t3" text-anchor="middle">mask</text>
<rect x="568" y="64" width="130" height="64" class="bx2"/>
<text x="633" y="90" class="t1" text-anchor="middle">策略</text>
<text x="633" y="108" class="t3" text-anchor="middle">policy</text>
<rect x="744" y="64" width="130" height="64" class="bx"/>
<text x="809" y="90" class="t1" text-anchor="middle">应用</text>
<text x="809" y="108" class="t3" text-anchor="middle">apply</text>
<rect x="920" y="64" width="130" height="64" class="bx"/>
<text x="985" y="90" class="t1" text-anchor="middle">门</text>
<text x="985" y="108" class="t3" text-anchor="middle">gate</text>

<path d="M170,96 L215,96" class="ln" marker-end="url(#ah)"/>
<path d="M346,96 L391,96" class="ln" marker-end="url(#ah)"/>
<path d="M522,96 L567,96" class="ln" marker-end="url(#ah)"/>
<path d="M698,96 L743,96" class="ln" marker-end="url(#ah)"/>
<path d="M874,96 L919,96" class="ln" marker-end="url(#ah)"/>

<!-- 每步注解 -->
<text x="105" y="150" class="t2s" text-anchor="middle">读编译态 S_t</text>
<text x="105" y="166" class="t2s" text-anchor="middle">黑板槽位 + 前提</text>
<text x="281" y="150" class="t2s" text-anchor="middle">生成候选菜单</text>
<text x="281" y="166" class="t5" text-anchor="middle">MenuSpec 槽位选项</text>
<text x="457" y="150" class="t2s" text-anchor="middle">缩到合法集,切除非法未来</text>
<text x="457" y="166" class="t5" text-anchor="middle">A_valid(S_t) ⊆ A</text>
<text x="457" y="182" class="t5" text-anchor="middle">H(A_t|S_t)≈log₂|A_valid|</text>
<text x="809" y="150" class="t2s" text-anchor="middle">提交增量</text>
<text x="809" y="166" class="t5" text-anchor="middle">S_t+1 = S_t ⊕ Δ_t</text>
<text x="985" y="150" class="t2s" text-anchor="middle">只记录不裁决</text>
<text x="985" y="166" class="t2s" text-anchor="middle">findings 上账</text>

<!-- 策略席插拔点 -->
<circle cx="633" cy="128" r="4" class="ln"/>
<path d="M633,132 L423,242" class="lnf" stroke-dasharray="4 3"/>
<path d="M633,190 L633,242" class="lnf" stroke-dasharray="4 3"/>
<path d="M633,132 L843,242" class="lnf" stroke-dasharray="4 3"/>

<!-- 三席 -->
<rect x="328" y="246" width="190" height="58" class="bx"/>
<text x="423" y="270" class="t4" text-anchor="middle">确定性席</text>
<text x="423" y="288" class="t3" text-anchor="middle">deterministic</text>
<rect x="538" y="246" width="190" height="58" class="bx"/>
<text x="633" y="270" class="t4" text-anchor="middle">LLM 席</text>
<text x="633" y="288" class="t3" text-anchor="middle">llm</text>
<rect x="748" y="246" width="190" height="58" class="bx"/>
<text x="843" y="270" class="t4" text-anchor="middle">人席</text>
<text x="843" y="288" class="t3" text-anchor="middle">human</text>

<text x="423" y="326" class="t2s" text-anchor="middle">options[0]=cheapest · 字节锚</text>
<text x="633" y="326" class="t2s" text-anchor="middle">掩码内提议 · 模型无关</text>
<text x="843" y="326" class="t2s" text-anchor="middle">否决 = 一次合法推导</text>

<text x="633" y="362" class="t2" text-anchor="middle">策略席可插拔:谁应答记 seat 上账;换席不换门——同一原子、同一套掩码与门</text>
<text x="633" y="380" class="t2s" text-anchor="middle">有效性席(掩码 / 门 / grounder)永不换手</text>

<!-- 账本 -->
<path d="M985,128 L985,410" class="ln" marker-end="url(#ah)"/>
<text x="995" y="280" class="t5">上账</text>
<rect x="40" y="412" width="1080" height="52" class="bx"/>
<text x="56" y="434" class="t1">账本 LEDGER</text>
<text x="56" y="452" class="t3">自问自答 QUESTION-DRIVEN AGENDA</text>
<text x="300" y="434" class="t2">每步上账:question 问句 · menu 合法菜单 · action 提交动作 · seat 席位 · reply 原始回复 · obligations 义务</text>
<text x="300" y="452" class="t2s">议程 = 问题清单;repair = 重新问某一个问题</text>

<!-- 图例 -->
<circle cx="46" cy="500" r="4" class="ln"/>
<text x="58" y="504" class="t2">策略席插拔点:确定性 / LLM / 人</text>
<path d="M300,500 L330,500" class="lnf" stroke-dasharray="4 3"/>
<text x="338" y="504" class="t2">插拔连线</text>
<rect x="470" y="491" width="24" height="16" class="bx2"/>
<text x="502" y="504" class="t2">强调框 = 判断席(选择必过席)</text>
<text x="40" y="540" class="t3">真源:看板 08 Glossary「六步原子 / 真菜单·席位 / 法·判别刀」 · 地图 §0.5/§1.3 · 理论卷 §2</text>
</svg>
