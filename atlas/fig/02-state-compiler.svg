<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="600" viewBox="0 0 1160 600" role="img" aria-label="状态编译:完整历史 H_t 经 φ 编译为最小充分状态 S_t=(G,C,L,O,U)+前提+义务账本;决策只读编译态;双轨 L/S 记法">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;family=Space+Mono:wght@400;700&amp;family=Noto+Sans+SC:wght@400;500;700&amp;display=swap');
:root{--ink:#1a1a1a;--muted:#737373;--faint:#a6a6a6;--line:#ededed;--line-strong:#dcdcdc;--bg:#ffffff;--ok:#3f7350;--gate:#a3822f;--risk:#a4453a;
--sans:"Inter","Noto Sans SC","PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;
--mono:"Space Mono","SFMono-Regular",Consolas,Menlo,monospace;}
@media (prefers-color-scheme:dark){:root{--ink:#e8e8e8;--muted:#9a9a9a;--faint:#6f6f6f;--line:#242424;--line-strong:#333333;--bg:#141414;--ok:#6fae83;--gate:#c9a558;--risk:#c76b5f;}}
.bg{fill:var(--bg)}
.bx{fill:none;stroke:var(--line-strong);stroke-width:1}
.bx2{fill:none;stroke:var(--ink);stroke-width:1.3}
.t1{font:700 13px var(--sans);fill:var(--ink)}
.t1m{font:700 12px var(--mono);fill:var(--ink)}
.t2{font:11px var(--sans);fill:var(--muted)}
.t2s{font:10px var(--sans);fill:var(--muted)}
.t3{font:9.5px var(--mono);fill:var(--faint);letter-spacing:.08em}
.t4{font:10.5px var(--sans);fill:var(--ink)}
.t5{font:10px var(--mono);fill:var(--muted)}
.gt-m{font:9.5px var(--mono);fill:var(--gate);letter-spacing:.04em}
.gt-l{stroke:var(--gate);stroke-width:1.2;fill:none}
.ln{stroke:var(--ink);stroke-width:1;fill:none}
.lnf{stroke:var(--faint);stroke-width:.8;fill:none}
.dot{fill:var(--faint)}
.ok-l{stroke:var(--ok);stroke-width:1.3;fill:none}
.ok-t{font:10px var(--sans);fill:var(--ok)}
.rk-l{stroke:var(--risk);stroke-width:1.2;fill:none}
.rk-t{font:10.5px var(--sans);fill:var(--risk)}
.rk-s{font:9.5px var(--mono);fill:var(--risk);letter-spacing:.06em}
.ah{fill:var(--ink)}.ahk{fill:var(--ok)}.ahr{fill:var(--risk)}
</style>
<rect class="bg" width="1160" height="600"/>
<defs>
<marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="ah"/></marker>
<marker id="ahk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="ahk"/></marker>
<marker id="ahr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="ahr"/></marker>
</defs>

<text x="40" y="34" class="t3">马尔可夫化 = 不是遗忘过去,而是编译过去 —— H_t →φ→ S_t(理论卷 §3)</text>

<!-- 完整历史 -->
<rect x="40" y="60" width="300" height="250" class="bx"/>
<text x="56" y="86" class="t1">完整历史 H_t</text>
<text x="56" y="102" class="t3">FULL HISTORY</text>
<text x="56" y="130" class="t2">已接受的决定</text>
<text x="56" y="150" class="t2">已否决的提案</text>
<text x="56" y="170" class="t2">过期假设</text>
<text x="56" y="190" class="t2">推理草稿</text>
<text x="56" y="210" class="t2">自我修正</text>
<text x="56" y="230" class="t2">尚未确认的模糊意图</text>
<text x="56" y="262" class="rk-t">历史越长,噪声与冲突越容易被重新激活</text>
<text x="56" y="284" class="rk-t">直接读取历史记录 A_t~P(A_t|H_t) → 漂移 ✗</text>

<!-- φ 编译 -->
<path d="M340,180 L558,180" class="ln" marker-end="url(#ah)"/>
<text x="450" y="146" class="t1" text-anchor="middle">状态编译 STATE COMPILER</text>
<text x="450" y="168" class="t1m" text-anchor="middle">H_t → φ → S_t</text>
<text x="450" y="202" class="t2" text-anchor="middle">面向未来的最小充分表示</text>
<text x="450" y="218" class="t2s" text-anchor="middle">删除无关历史,保留会改变未来合法动作的信息</text>

<!-- 编译态 -->
<rect x="560" y="48" width="560" height="336" class="bx2"/>
<text x="576" y="74" class="t1">编译态 S_t = (G, C, L, O, U)</text>
<text x="576" y="90" class="t3">COMPILED STATE · 代码 = 黑板 BLACKBOARD</text>
<rect x="576" y="104" width="528" height="28" class="bx"/>
<text x="590" y="123" class="t1m">G</text><text x="620" y="123" class="t4">当前几何与拓扑</text><text x="1092" y="123" class="t3" text-anchor="end">GEOMETRY · TOPOLOGY</text>
<rect x="576" y="138" width="528" height="28" class="bx"/>
<text x="590" y="157" class="t1m">C</text><text x="620" y="157" class="t4">已激活的约束</text><text x="1092" y="157" class="t3" text-anchor="end">ACTIVE CONSTRAINTS</text>
<rect x="576" y="172" width="528" height="28" class="bx"/>
<text x="590" y="191" class="t1m">L</text><text x="620" y="191" class="t4">已锁定的承诺</text><text x="1092" y="191" class="t3" text-anchor="end">LOCKED COMMITMENTS</text>
<rect x="576" y="206" width="528" height="28" class="bx"/>
<text x="590" y="225" class="t1m">O</text><text x="620" y="225" class="t4">仍开放的决策</text><text x="1092" y="225" class="t3" text-anchor="end">OPEN DECISIONS</text>
<rect x="576" y="240" width="528" height="28" class="bx"/>
<text x="590" y="259" class="t1m">U</text><text x="620" y="259" class="t4">未解决的冲突与不确定性</text><text x="1092" y="259" class="t3" text-anchor="end">UNRESOLVED CONFLICTS</text>
<rect x="576" y="274" width="528" height="30" class="bx2"/>
<text x="590" y="294" class="t4">前提 premises:parti · function_intent · tradition</text>
<text x="1092" y="294" class="gt-m" text-anchor="end">铁律11:每个决策必读</text>
<rect x="576" y="310" width="528" height="30" class="bx2"/>
<text x="590" y="330" class="t4">义务账本 𝒪_t:created → discharged · 未清即为债</text>
<text x="1092" y="330" class="gt-m" text-anchor="end">同时连接 L / S 两个平面(合议)</text>
<text x="576" y="366" class="t2s">理想状态不是完整生成日志——它删除无关历史,但保留所有会改变未来合法动作的信息</text>

<!-- 决策只读编译态 -->
<path d="M840,384 L840,432" class="ln" marker-end="url(#ah)"/>
<text x="852" y="412" class="t2">决策只读编译态</text>
<rect x="700" y="434" width="280" height="48" class="bx2"/>
<text x="840" y="454" class="t1m" text-anchor="middle">A_t ~ π(A_t | S_t)</text>
<text x="840" y="472" class="t2s" text-anchor="middle">policy 读黑板,不读 transcript</text>

<!-- 双轨 L/S -->
<rect x="40" y="420" width="560" height="112" class="bx"/>
<text x="56" y="444" class="t3">双轨记法 L / S(合议 2026-07-16 · Codex 双轨形式化)</text>
<text x="56" y="468" class="t2">L 面 · 账本:L_t+1 = L_t ⊕ e_t —— 只增不删,保存可回放证据,不参与日常决策</text>
<text x="56" y="490" class="t2">S 面 · 运行态:S_t = φ(L_≤t) —— 压缩成可操作的马尔可夫状态,供决策读取</text>
<text x="56" y="514" class="t2s">三层:原始推理史 H(混杂、可遗忘)→ 干净账本 L(保留、可回放)→ 编译态 S(马尔可夫、供决策读取)</text>

<text x="40" y="568" class="t3">真源:理论卷 §3(状态编译 / 构造马尔可夫性) · 合议 §1(双轨 L/S) · 看板 08 Glossary「状态编译 S_t」</text>
</svg>
