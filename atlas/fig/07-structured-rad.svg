<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="640" viewBox="0 0 1160 640" role="img" aria-label="结构化 RAD 流水线:检索段落、逐源掩码单问抽取、带单位事实账本、律层、拓扑正则化、一致门;对照朴素 RAD 整段灌注净变差画叉">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;family=Space+Mono:wght@400;700&amp;family=Noto+Sans+SC:wght@400;500;700&amp;display=swap');
:root{--ink:#1a1a1a;--muted:#737373;--faint:#a6a6a6;--line:#ededed;--line-strong:#dcdcdc;--bg:#ffffff;--ok:#3f7350;--gate:#a3822f;--risk:#a4453a;
--sans:"Inter","Noto Sans SC","PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;
--mono:"Space Mono","SFMono-Regular",Consolas,Menlo,monospace;}
@media (prefers-color-scheme:dark){:root{--ink:#e8e8e8;--muted:#9a9a9a;--faint:#6f6f6f;--line:#242424;--line-strong:#333333;--bg:#141414;--ok:#6fae83;--gate:#c9a558;--risk:#c76b5f;}}
.bg{fill:var(--bg)}
.bx{fill:none;stroke:var(--line-strong);stroke-width:1}
.bx2{fill:none;stroke:var(--ink);stroke-width:1.3}
.t1{font:700 13px var(--sans);fill:var(--ink)}
.t1m{font:700 12px var(--mono);fill:var(--ink)}
.t2{font:11px var(--sans);fill:var(--muted)}
.t2s{font:10px var(--sans);fill:var(--muted)}
.t3{font:9.5px var(--mono);fill:var(--faint);letter-spacing:.08em}
.t4{font:10.5px var(--sans);fill:var(--ink)}
.t5{font:10px var(--mono);fill:var(--muted)}
.gt-m{font:9.5px var(--mono);fill:var(--gate);letter-spacing:.04em}
.gt-l{stroke:var(--gate);stroke-width:1.2;fill:none}
.ln{stroke:var(--ink);stroke-width:1;fill:none}
.lnf{stroke:var(--faint);stroke-width:.8;fill:none}
.dot{fill:var(--faint)}
.ok-l{stroke:var(--ok);stroke-width:1.3;fill:none}
.ok-t{font:10px var(--sans);fill:var(--ok)}
.rk-l{stroke:var(--risk);stroke-width:1.2;fill:none}
.rk-t{font:10.5px var(--sans);fill:var(--risk)}
.ah{fill:var(--ink)}.ahk{fill:var(--ok)}.ahr{fill:var(--risk)}
</style>
<rect class="bg" width="1160" height="640"/>
<defs>
<marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="ah"/></marker>
<marker id="ahk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="ahk"/></marker>
<marker id="ahr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" class="ahr"/></marker>
</defs>

<text x="40" y="34" class="t3">结构化 RAD · 检索增强决策 STRUCTURED RETRIEVAL-AUGMENTED DECISION — 检索喂事实账本,不喂 prompt</text>

<!-- 流水线 -->
<rect x="40" y="60" width="160" height="100" class="bx"/>
<text x="52" y="82" class="t3">RETRIEVE</text>
<text x="52" y="102" class="t4">检索段落</text>
<text x="52" y="122" class="t2s">六源测绘文献</text>
<rect x="224" y="60" width="160" height="100" class="bx"/>
<text x="236" y="82" class="t3">EXTRACT</text>
<text x="236" y="102" class="t4">逐源掩码单问抽取</text>
<text x="236" y="122" class="t2s">槽位 + 单位钉死</text>
<text x="236" y="138" class="t2s">逐源隔离 = MDP 单问</text>
<rect x="408" y="60" width="160" height="100" class="bx"/>
<text x="420" y="82" class="t3">FACT LEDGER</text>
<text x="420" y="102" class="t4">带单位事实账本</text>
<text x="420" y="122" class="t2s">value + unit + source</text>
<text x="420" y="138" class="t2s">30rf×0.296→8.88≈8.9 互证</text>
<rect x="592" y="60" width="160" height="100" class="bx"/>
<text x="604" y="82" class="t3">LAW LAYER</text>
<text x="604" y="102" class="t4">律层:推导·换算·互证</text>
<text x="604" y="122" class="t2s">起拱 = H − D/2 = 21.65</text>
<text x="604" y="138" class="t2s">推导属律空间不属问句</text>
<rect x="776" y="60" width="160" height="100" class="bx"/>
<text x="788" y="82" class="t3">REGULARIZE</text>
<text x="788" y="102" class="t4">拓扑正则化</text>
<text x="788" y="122" class="t2s">反对称去重 · 关系归型</text>
<text x="788" y="138" class="t2s">只正则化,不造关系</text>
<rect x="960" y="60" width="160" height="100" class="bx2"/>
<text x="972" y="82" class="t3">CONSISTENCY</text>
<text x="972" y="102" class="t4">一致门</text>
<text x="972" y="122" class="t2s">三轮:拒 → 拒 → 过</text>
<text x="972" y="138" class="ok-t">门在全实验零漏放</text>

<path d="M200,110 L223,110" class="ln" marker-end="url(#ah)"/>
<path d="M384,110 L407,110" class="ln" marker-end="url(#ah)"/>
<path d="M568,110 L591,110" class="ln" marker-end="url(#ah)"/>
<path d="M752,110 L775,110" class="ln" marker-end="url(#ah)"/>
<path d="M936,110 L959,110" class="ln" marker-end="url(#ah)"/>

<text x="972" y="180" class="t2s">拒:起拱43.3 · 拒:oculus=30 单位污染 · 过</text>

<path d="M1040,190 L1040,208" class="ln" marker-end="url(#ah)"/>
<rect x="800" y="210" width="320" height="52" class="bx2"/>
<text x="812" y="232" class="t4">过门才入状态 S_t</text>
<text x="812" y="250" class="t2s">体块承诺 + 拓扑关系,带 basis 与出处</text>

<!-- 判词 -->
<rect x="40" y="292" width="1080" height="66" class="bx2"/>
<text x="56" y="318" class="t1">判词</text>
<text x="150" y="318" class="t2">检索喂事实账本,不喂 prompt;LLM 只答知识问句(有什么 · 谁托谁)</text>
<text x="150" y="340" class="t2">后果问句(等于几 · 在哪里 · 自洽否)全归律——边界即白盒论点本身</text>

<!-- 朴素 RAD 对照 -->
<text x="40" y="398" class="t3">对照:朴素 RAD NAIVE INJECTION — 整段灌注 = 净变差 ✗</text>
<rect x="40" y="414" width="180" height="56" class="bx"/>
<text x="52" y="438" class="t4">检索段落</text>
<text x="52" y="456" class="t2s">同样六源</text>
<path d="M220,442 L418,442" class="rk-l" marker-end="url(#ahr)"/>
<text x="320" y="430" class="rk-t" text-anchor="middle">整段灌注 prompt</text>
<path d="M305,427 L335,457" class="rk-l"/>
<path d="M335,427 L305,457" class="rk-l"/>
<rect x="420" y="414" width="180" height="56" class="bx"/>
<text x="432" y="438" class="t4">LLM 一把出</text>
<text x="432" y="456" class="t2s">散文事实无槽位语义</text>
<path d="M600,442 L798,442" class="rk-l" marker-end="url(#ahr)"/>
<rect x="800" y="414" width="320" height="56" class="rk-l"/>
<text x="812" y="438" class="rk-t">净变差:比盲考更糟</text>
<text x="812" y="456" class="t2s">引源满分(cited=5)内容崩 = 引用 ≠ 理解</text>

<text x="40" y="502" class="t2">· 字面性劫持:「壁厚 6.4」被造成 6.4m 高的板 / 6.4×6.4×43.3 的柱(槽位语义不在散文里)</text>
<text x="40" y="524" class="t2">· 六源同灌 = 变相滚动上下文,违反自家 MDP 单问纪律;检索淹没先验(盲考会的 bears_on 链在 RAD 下丢失)</text>
<text x="40" y="546" class="t2">· 盲考基线也不可用:明信片偏差——中介体块 0/3 全漏,图纸级知识在文本语料结构性缺席(RAD 必要性最硬实证)</text>

<text x="40" y="604" class="t3">真源:REPORT.md 追加五(RAD 三方对照 / 修复三轮 / 判词) · 追加四(标准答案考 · 明信片偏差) · 看板 08 Glossary「RAD」</text>
</svg>
