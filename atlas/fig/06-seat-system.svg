<!-- 子项 S1–S5 -->
<rect x="40" y="220" width="196" height="100" class="bx"/>
<text x="52" y="242" class="t3">S1 · qwen3:30b</text>
<text x="52" y="262" class="t4">体块构成</text>
<text x="52" y="282" class="t2s">通过门,但答案信息不足</text>
<text x="52" y="298" class="t2s">(门过松,未能拦截)</text>
<text x="52" y="314" class="t5">4.2s</text>
<rect x="256" y="220" width="196" height="100" class="bx"/>
<text x="268" y="242" class="t3">S2 · glm-4.7-flash</text>
<text x="268" y="262" class="t4">场地落位</text>
<text x="268" y="282" class="rk-t">效度门拒(ids 全空)</text>
<text x="268" y="298" class="ok-t">→ 确定性回退,回退上账</text>
<text x="268" y="314" class="t5">34.9s</text>
<rect x="472" y="220" width="196" height="100" class="bx"/>
<text x="484" y="242" class="t3">S3 · qwen3:30b</text>
<text x="484" y="262" class="t4">开口承诺</text>
<text x="484" y="282" class="t2s">oculus=4m 过门</text>
<text x="484" y="298" class="rk-t">允许范围过宽(2–12),未能拦截</text>
<text x="484" y="314" class="t5">12.0s</text>
<rect x="688" y="220" width="196" height="100" class="bx2"/>
<text x="700" y="242" class="t3">S4 · deepseek-r1</text>
<text x="700" y="262" class="t4">批判席 CRITIC</text>
<text x="700" y="282" class="t2s">① portico 柱列缺失(note)</text>
<text x="700" y="298" class="t2s">② oculus 4 vs 史实 8.9(hard)</text>
<text x="700" y="314" class="t5">35.9s · 两项批判均命中</text>
<rect x="904" y="220" width="196" height="100" class="bx"/>
<text x="916" y="242" class="t3">S5 · 零 LLM</text>
<text x="916" y="262" class="t4">实现 + 视觉轮</text>
<text x="916" y="282" class="t2s">鼓+穹圆厅成立</text>
<text x="916" y="298" class="t2s">真实 annulus 环墙承托分级半球</text>
<text x="916" y="314" class="t5">—</text>

