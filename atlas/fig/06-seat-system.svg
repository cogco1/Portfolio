<text x="40" y="34" class="t3">席位体系 SEAT SYSTEM — 效度门 → 回退上账 → 批判席 → 修复环(素材:调度席实验 2026-07-17)</text>

<!-- 可插拔三席 -->
<rect x="40" y="54" width="180" height="44" class="bx"/>
<text x="130" y="72" class="t4" text-anchor="middle">确定性席 deterministic</text>
<text x="130" y="88" class="t2s" text-anchor="middle">默认 = 字节锚</text>
<rect x="240" y="54" width="180" height="44" class="bx"/>
<text x="330" y="72" class="t4" text-anchor="middle">LLM 席 llm</text>
<text x="330" y="88" class="t2s" text-anchor="middle">掩码内提议</text>
<rect x="440" y="54" width="180" height="44" class="bx"/>
<text x="530" y="72" class="t4" text-anchor="middle">人席 human</text>
<text x="530" y="88" class="t2s" text-anchor="middle">否决 = 合法推导</text>
<text x="660" y="68" class="t2">同一原子使用同一套门;谁作答,就将 seat 上账;发生回退,就留下 fallback 记录</text>
<text x="660" y="86" class="t2s">席位分工:schema 承诺由 qwen3 独立作答 · deepseek 负责批判</text>
<text x="660" y="102" class="t2s">glm 只提取数字,经外部解析后使用,永不直接入账</text>

<!-- 调度席 -->
<rect x="40" y="126" width="1080" height="60" class="bx2"/>
<text x="56" y="150" class="t1">调度席 DISPATCHER(Claude)</text>
<text x="300" y="150" class="t2">调度席逐项下发任务:每个子项只包含编译态与一条掩码单问,不携带滚动上下文</text>
<text x="300" y="172" class="gt-m">调度席的门也要接受审查——S1 门有三处松动(portico 形状 / 天空体块 / basis 质量)</text>

