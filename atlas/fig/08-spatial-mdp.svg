<rect x="782" y="286" width="8" height="14" class="ah"/>
<rect x="840" y="286" width="8" height="14" class="ah"/>
<rect x="898" y="286" width="8" height="14" class="ah"/>
<rect x="716" y="300" width="200" height="26" class="ln"/>
