<text x="940" y="318" class="t1m">P(柱位 | 台基)</text>
<text x="716" y="352" class="t2">「原点只存在于实现层,设计层无坐标——柱子的位置</text>
<text x="716" y="372" class="t2">只与台基的大小有关;推算时只读取这一部分,无需读取其他节点。」</text>
<text x="716" y="396" class="t3">KEVIN 判词 2026-07-17 · 空间 MDP 入论文素材</text>
<text x="716" y="418" class="t2s">推论:局部马尔可夫性从决策序列推广到空间依赖</text>

<!-- 全局门 -->
<path d="M320,394 L320,466" class="lnf" marker-end="url(#ah)"/>
<path d="M555,206 L555,466" class="lnf" marker-end="url(#ah)"/>
<text x="332" y="440" class="t5">全部体量合并后整体检查</text>
<rect x="140" y="468" width="500" height="72" class="bx2"/>
<text x="156" y="492" class="t1">全局门 GLOBAL GATE</text>
<text x="156" y="514" class="t2">非局部约束不纳入父节点集合:重叠 overlap · 越界 out-of-bounds</text>
<text x="156" y="532" class="t2s">推导局部化,验证全局化 · 全楼重叠校验尚未完成,已作为假阴性问题列入待办</text>

<!-- 三推论 -->
<text x="40" y="576" class="t3">三推论 COROLLARIES(REPORT 追加五)</text>
<text x="40" y="598" class="t2">① 编译态越小,漂移面越小 ② 父节点未变,子树保持不动,为 Selective Uncommit 提供理论依据(P3.1) ③ 父集越小,菜单越小,H(A_t|S_t) 越低</text>
<text x="40" y="620" class="gt-m">落位求解器(已立项):轴 + 关系 → 坐标的确定性前向推算 —— LLM 永不回答坐标</text>
<text x="40" y="644" class="t3">真源:REPORT.md 追加五(Kevin 空间 MDP 判词) · 追加四(标准答案五拓扑) · 看板 05 明日(落位求解器 v0)</text>
