<text x="52" y="367" class="t4">效度门 VALIDITY GATE — schema 强制 · 词汇 · 范围带;拒收即回退上账,LLM 答案永不直接入状态</text>

<!-- 修复环 -->
<path d="M786,320 L786,470 L570,470 L570,382" class="rk-l" marker-end="url(#ahr)"/>
<text x="678" y="494" class="rk-t" text-anchor="middle">修复环 REPAIR LOOP:critic hard 发现喂回编译态,重答恰好一个问题</text>
<text x="678" y="514" class="rk-t" text-anchor="middle">oculus 4 → 8.9m(11.7s)= Selective Uncommit 微缩活体</text>

<!-- 三硬结论 -->
<rect x="40" y="546" width="346" height="88" class="bx"/>
<text x="52" y="568" class="t4">① 多席冗余 = 纵深防御</text>
<text x="52" y="588" class="t2s">效度门漏掉 oculus 4m,批判席将它捕获;</text>
<text x="52" y="604" class="t2s">批判席难以发现的格式问题,则由效度门捕获</text>
<text x="52" y="620" class="t2s">(glm ids 全空)</text>
<rect x="407" y="546" width="346" height="88" class="bx"/>
<text x="419" y="568" class="t4">② 调度席的门也要被审</text>
<text x="419" y="588" class="t2s">门的质量决定状态的质量;「闸口全绿,</text>
<text x="419" y="604" class="t2s">内容仍不对」已在调度层重演;D2.5 接线时</text>
<text x="419" y="620" class="t2s">必须按清单硬化 S1 门</text>
<rect x="774" y="546" width="346" height="88" class="bx"/>
<text x="786" y="568" class="t4">③ 同席跨轮采样漂移真实存在</text>
<text x="786" y="588" class="t2s">MDP 单问防上下文漂移,防不了采样漂移;</text>
<text x="786" y="604" class="t2s">temp 0.2 仍需门+批判席双保险,</text>
<text x="786" y="620" class="t2s">或关键承诺双抽一致才入账</text>

